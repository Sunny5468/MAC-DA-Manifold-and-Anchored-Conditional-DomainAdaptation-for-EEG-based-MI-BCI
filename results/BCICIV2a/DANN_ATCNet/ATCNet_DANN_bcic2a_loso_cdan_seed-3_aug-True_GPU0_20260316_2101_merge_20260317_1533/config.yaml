dann_kwargs:
  discriminator_dropout: 0.5
  discriminator_hidden_dim: 256
  discriminator_num_layers: 2
  lambda_domain: 1.0
  lambda_entropy: 0.0
  lambda_schedule: true
  lr_discriminator: null
  use_entropy_conditioning: false
dataset_name: bcic2a_loso_cdan
gpu_id: 0
max_epochs: 125
max_epochs_loso: 125
model: ATCNet
model_kwargs:
  D: 2
  F1: 16
  beta_1: 0.5
  beta_2: 0.999
  d_model: 32
  dropout_attn: 0.5
  dropout_conv: 0.3
  dropout_tcn: 0.3
  kernel_length_conv: 64
  kernel_length_tcn: 4
  key_dim: 8
  lr: 0.0009
  n_head: 2
  n_windows: 5
  optimizer: adam
  pool_length: 8
  scheduler: true
  tcn_depth: 2
  warmup_epochs: 3
  warmup_epochs_loso: 3
  weight_decay: 0.001
plot_cm_average: true
plot_cm_per_subject: true
plot_tsne_per_subject: true
preprocessing:
  batch_size: 48
  ea: false
  high_cut: null
  interaug: true
  low_cut: null
  sfreq: 250
  start: -0.5
  stop: 0.0
  z_scale: true
seed: 3
subject_ids: 9
tsne_max_samples: 2000
z_scale: true
