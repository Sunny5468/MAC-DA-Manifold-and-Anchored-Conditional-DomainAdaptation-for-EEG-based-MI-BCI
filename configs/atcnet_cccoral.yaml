# CDAN + CCCORAL Configuration (Baseline only)

# general
dataset_name: ""
subject_ids: "all"
max_epochs: 1000
max_epochs_loso: 125
seed: 0

# preprocessing
z_scale: True
interaug: True
preprocessing:
  bcic2a:
    sfreq: 250
    low_cut: null
    high_cut: null
    start: -0.5
    stop: 0.0
    batch_size: 48
  weibo2014:
    sfreq: 250
    low_cut: null
    high_cut: null
    start: -0.5
    stop: 0.0
    batch_size: 48
    test_ratio: 0.3
    split_seed: 42

# model
model: "ATCNet"
model_kwargs:
  F1: 16
  kernel_length_conv: 64
  pool_length: 8
  D: 2
  dropout_conv: 0.3
  d_model: 32
  key_dim: 8
  n_head: 2
  dropout_attn: 0.5
  tcn_depth: 2
  kernel_length_tcn: 4
  dropout_tcn: 0.3
  n_windows: 5

  lr: 0.0009
  beta_1: 0.5
  beta_2: 0.999
  weight_decay: 0.001
  optimizer: "adam"
  scheduler: True
  warmup_epochs: 20
  warmup_epochs_loso: 3

# baseline CDAN parameters
cdan_kwargs:
  discriminator_hidden_dim: 256
  discriminator_num_layers: 2
  discriminator_dropout: 0.5
  lambda_domain: 1.0
  lambda_entropy: 0.0
  use_entropy_conditioning: True
  use_random_layer: False
  random_dim: 1024
  lambda_schedule: True
  lr_discriminator: null

# CCCORAL parameters
cccoral_kwargs:
  lambda_cccoral: 0.02
  cccoral_alpha: 0.1
  pseudo_threshold: 0.8
  min_samples_per_class: 2
  cccoral_warmup_epochs: 2
